name: stream
description: A minimalist and opinionated writing application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^5.1.0
  flutter_markdown: ^0.6.17+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  fonts:
    - family: FiraCode
      fonts:
        - asset: assets/fonts/FiraCode/FiraCode-Regular.ttf
          style: normal
          weight: 500
        - asset: assets/fonts/FiraCode/FiraCode-Light.ttf
          weight: 300
        - asset: assets/fonts/FiraCode/FiraCode-Medium.ttf
          weight: 400
        - asset: assets/fonts/FiraCode/FiraCode-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/FiraCode/FiraCode-Bold.ttf
          weight: 700
    - family: Cozette
      fonts:
        - asset: assets/fonts/Cozette/Cozette-Regular.ttf
          style: normal
        - asset: assets/fonts/Cozette/Cozette-Bold.ttf
          weight: 700
    - family: Monoid
      fonts:
        - asset: assets/fonts/Monoid/Monoid-Regular.ttf
          style: normal
        - asset: assets/fonts/Monoid/Monoid-Bold.ttf
          weight: 700
        - asset: assets/fonts/Monoid/Monoid-Italic.ttf
          style: italic
